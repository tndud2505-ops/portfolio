<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" role="img" aria-labelledby="title desc">
  <title id="title">중고거래 매물 추적 화면</title>
  <desc id="desc">여러 사이트의 매물 정보를 수집해 필터링하고 후보를 비교하는 흐름</desc>
  <defs>
    <style>
      text { font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; fill: #1f211d; }
      .mono { font-family: "IBM Plex Mono", "Consolas", monospace; letter-spacing: .08em; }
      .title { font-size: 34px; font-weight: 800; letter-spacing: -.03em; }
      .label { font-size: 20px; font-weight: 800; fill: #2f5b49; }
      .small { font-size: 16px; fill: #5e665e; }
      .card { fill: #fbfaf6; stroke: #d4c8b7; stroke-width: 2; }
      .soft { fill: #edf3ea; stroke: #abc3ad; stroke-width: 2; }
      .warn { fill: #f2e5d6; stroke: #c99f72; stroke-width: 2; }
      .line { fill: none; stroke: #2f5b49; stroke-width: 3; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#2f5b49"/>
    </marker>
  </defs>
  <rect width="1000" height="760" fill="#f7f4ee"/>
  <path d="M0 95H1000M0 190H1000M0 285H1000M0 380H1000M0 475H1000M0 570H1000M0 665H1000M95 0V760M190 0V760M285 0V760M380 0V760M475 0V760M570 0V760M665 0V760M760 0V760M855 0V760M950 0V760" stroke="#e5ded3"/>
  <text x="48" y="58" class="mono small">USED MARKET TRACKER</text>
  <text x="48" y="102" class="title">흩어진 매물을 한 화면에서 비교하기</text>

  <rect x="58" y="160" width="220" height="440" rx="24" class="card"/>
  <text x="88" y="202" class="label">추적 조건</text>
  <rect x="88" y="234" width="152" height="44" rx="16" fill="#fff" stroke="#d4c8b7"/>
  <text x="108" y="262" class="small">키워드: 데코</text>
  <rect x="88" y="300" width="152" height="44" rx="16" fill="#fff" stroke="#d4c8b7"/>
  <text x="108" y="328" class="small">가격 범위</text>
  <rect x="88" y="366" width="152" height="44" rx="16" fill="#fff" stroke="#d4c8b7"/>
  <text x="108" y="394" class="small">활성 사이트</text>
  <text x="90" y="456" class="small">1. 검색 결과 수집</text>
  <text x="90" y="486" class="small">2. 형식 통일</text>
  <text x="90" y="516" class="small">3. 중복 제거</text>
  <text x="90" y="546" class="small">4. 후보 알림</text>

  <rect x="370" y="154" width="270" height="128" rx="20" class="soft"/>
  <text x="404" y="198" class="label">사이트별 후보</text>
  <text x="404" y="232" class="small">중고나라 · 번개장터</text>
  <text x="404" y="258" class="small">가격, 설명, 등록 시점 수집</text>

  <rect x="370" y="330" width="270" height="132" rx="20" class="card"/>
  <text x="404" y="374" class="label">공통 데이터 정리</text>
  <text x="404" y="408" class="small">키워드 / 가격 / 상태</text>
  <text x="404" y="434" class="small">중복 여부 / 확인 필요 항목</text>

  <rect x="710" y="154" width="220" height="158" rx="20" class="warn"/>
  <text x="742" y="198" class="label">주의 항목</text>
  <text x="742" y="232" class="small">가격 편차 큼</text>
  <text x="742" y="258" class="small">설명 부족</text>
  <text x="742" y="284" class="small">중복 후보</text>

  <rect x="710" y="366" width="220" height="150" rx="20" class="soft"/>
  <text x="742" y="410" class="label">알림</text>
  <text x="742" y="444" class="small">조건에 맞는 후보만</text>
  <text x="742" y="470" class="small">Discord로 전달</text>

  <path class="line" d="M278 380 C320 310 332 226 370 218"/>
  <path class="line" d="M505 282 V330"/>
  <path class="line" d="M640 396 C670 340 682 240 710 232"/>
  <path class="line" d="M640 420 C680 430 682 440 710 440"/>

  <rect x="370" y="548" width="560" height="94" rx="20" fill="#fff" stroke="#d8cebd"/>
  <text x="404" y="588" class="label">결과 화면</text>
  <text x="404" y="620" class="small">자동 구매가 아니라, 관심 후보를 빠르게 비교하고 놓친 조건을 다시 확인하기 위한 화면입니다.</text>
</svg>
