<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" role="img" aria-labelledby="title desc">
  <title id="title">Discord 원격 작업 모니터링 구조도</title>
  <desc id="desc">Discord 요청이 승인 큐와 로컬 작업 세션을 거쳐 로그와 결과로 다시 회신되는 흐름</desc>
  <defs>
    <style>
      text { font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; fill: #1f211d; }
      .mono { font-family: "IBM Plex Mono", "Consolas", monospace; letter-spacing: .08em; }
      .label { font-size: 18px; fill: #2f5b49; font-weight: 700; }
      .small { font-size: 16px; fill: #5f665d; }
      .title { font-size: 32px; font-weight: 800; letter-spacing: -.03em; }
      .box { fill: #fbfaf6; stroke: #cfc5b6; stroke-width: 2; }
      .soft { fill: #edf3ea; stroke: #b8c8b9; stroke-width: 2; }
      .dark { fill: #2f2b2c; }
      .line { fill: none; stroke: #2f5b49; stroke-width: 3; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5b49"/>
    </marker>
  </defs>
  <rect width="920" height="680" fill="#f7f4ee"/>
  <path d="M0 92H920M0 184H920M0 276H920M0 368H920M0 460H920M0 552H920M92 0V680M184 0V680M276 0V680M368 0V680M460 0V680M552 0V680M644 0V680M736 0V680M828 0V680" stroke="#e4ded3" stroke-width="1"/>
  <text x="44" y="58" class="mono small">REMOTE WORK MONITOR</text>
  <text x="44" y="100" class="title">승인된 작업 요청을 밖에서도 확인하는 흐름</text>

  <rect x="54" y="154" width="230" height="360" rx="22" class="dark"/>
  <circle cx="84" cy="184" r="10" fill="#ff6258"/>
  <circle cx="116" cy="184" r="10" fill="#686263"/>
  <circle cx="148" cy="184" r="10" fill="#686263"/>
  <text x="82" y="238" fill="#fff" font-size="24" font-weight="800">Discord</text>
  <rect x="82" y="270" width="174" height="48" rx="14" fill="#3b3638"/>
  <circle cx="108" cy="294" r="9" fill="#45c66b"/>
  <text x="128" y="301" fill="#fff" font-size="18" font-weight="700">작업 요청</text>
  <rect x="82" y="336" width="174" height="48" rx="14" fill="#3b3638"/>
  <text x="104" y="367" fill="#fff" font-size="18" font-weight="700">승인 버튼</text>
  <rect x="82" y="402" width="174" height="70" rx="14" fill="#3b3638"/>
  <text x="104" y="431" fill="#fff" font-size="17" font-weight="700">로그와 결과 회신</text>
  <text x="104" y="458" fill="#d8d2c4" font-size="14">진행 중 / 완료 / 확인 필요</text>

  <rect x="346" y="176" width="220" height="100" rx="18" class="soft"/>
  <text x="374" y="215" class="label">승인 큐</text>
  <text x="374" y="246" class="small">요청을 바로 실행하지 않고</text>
  <text x="374" y="270" class="small">확인 후 작업으로 전달</text>

  <rect x="346" y="332" width="220" height="118" rx="18" class="box"/>
  <text x="374" y="372" class="label">로컬 작업 세션</text>
  <text x="374" y="403" class="small">작업 큐, 세션 상태 저장</text>
  <text x="374" y="427" class="small">중지/재시작, 로그 추적</text>

  <rect x="650" y="196" width="220" height="110" rx="18" class="box"/>
  <text x="680" y="236" class="label">상태 패널</text>
  <text x="680" y="268" class="small">진행률, 남은 시간</text>
  <text x="680" y="292" class="small">답변 필요 여부 표시</text>

  <rect x="650" y="362" width="220" height="108" rx="18" class="soft"/>
  <text x="680" y="402" class="label">결과 회신</text>
  <text x="680" y="434" class="small">로그, 첨부 파일, 요약을</text>
  <text x="680" y="458" class="small">Discord 메시지로 반환</text>

  <path class="line" d="M284 338 C310 338 318 226 346 226"/>
  <path class="line" d="M456 276 V332"/>
  <path class="line" d="M566 390 C612 390 606 250 650 250"/>
  <path class="line" d="M566 410 C612 410 606 416 650 416"/>
  <path class="line" d="M650 440 C555 560 250 558 180 492"/>

  <rect x="54" y="560" width="816" height="62" rx="18" fill="#fff" stroke="#d8cebd"/>
  <text x="82" y="597" class="label">핵심</text>
  <text x="150" y="597" class="small">원격 제어를 과하게 열어두는 것이 아니라, 승인된 작업의 상태와 로그를 놓치지 않게 만드는 모니터링 구조</text>
</svg>
